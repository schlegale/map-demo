<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #1a331a;
        overflow: hidden;
        touch-action: none;
      }
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }
      model-viewer {
        outline: none;
        width: 100px;
        height: 100px;
      }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  </head>
  <body>
    <div id="map"></div>
    <script>
      // ==========================================
      // GAME SETTINGS
      // ==========================================
      const TAP_TO_MOVE = true;

      let map = null;
      let userMarker = null;

      let lastLat = null;
      let lastLng = null;
      let realLat = null;
      let realLng = null;

      let isTapOverride = false;
      let returnTimeout = null;
      let animationFrameId = null;

      let currentHeading = 0;
      let lastCameraOrbit = null;

      // ==========================================
      // MATH UTILS
      // ==========================================
      function getBearing(startLat, startLng, destLat, destLng) {
        const toRad = (deg) => (deg * Math.PI) / 180;
        const dLng = toRad(destLng - startLng);
        const y = Math.sin(dLng) * Math.cos(toRad(destLat));
        const x = Math.cos(toRad(startLat)) * Math.sin(toRad(destLat)) - Math.sin(toRad(startLat)) * Math.cos(toRad(destLat)) * Math.cos(dLng);
        return ((Math.atan2(y, x) * 180) / Math.PI + 360) % 360;
      }

      function getDistanceMeters(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const p1 = (lat1 * Math.PI) / 180;
        const p2 = (lat2 * Math.PI) / 180;
        const dp = ((lat2 - lat1) * Math.PI) / 180;
        const dl = ((lon2 - lon1) * Math.PI) / 180;
        const a = Math.sin(dp / 2) * Math.sin(dp / 2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) * Math.sin(dl / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
      }

      // ==========================================
      // ANIMATION & ROTATION
      // ==========================================
      function updateModelOrientation() {
        const playerModel = document.getElementById("player-model");
        if (playerModel && map) {
          const screenAngle = currentHeading - map.getBearing();
          let baseAzimuth = screenAngle;

          const roundedAzimuth = Math.round(baseAzimuth * 10) / 10;
          const newOrbit = `${roundedAzimuth}deg 60deg 105%`;

          if (lastCameraOrbit !== newOrbit) {
            playerModel.setAttribute("camera-orbit", newOrbit);
            lastCameraOrbit = newOrbit;
          }
        }
      }

      function animateMarker(startLat, startLng, endLat, endLng, duration, onComplete) {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        const startTime = performance.now();

        function step(currentTime) {
          const elapsed = currentTime - startTime;
          let progress = elapsed / duration;
          if (progress > 1) progress = 1;

          const lat = startLat + (endLat - startLat) * progress;
          const lng = startLng + (endLng - startLng) * progress;

          userMarker.setLngLat([lng, lat]);
          map.setCenter([lng, lat]);

          lastLat = lat;
          lastLng = lng;

          if (progress < 1) {
            animationFrameId = requestAnimationFrame(step);
          } else {
            if (onComplete) onComplete();
          }
        }
        animationFrameId = requestAnimationFrame(step);
      }

      // ==========================================
      // MAIN MAP INITIALIZATION
      // ==========================================
      window.updateUserLocation = function (lat, lng, modelUrl) {
        realLat = lat;
        realLng = lng;

        if (!map) {
          map = new maplibregl.Map({
            container: "map",
            style: "https://tiles.openfreemap.org/styles/liberty",
            center: [lng, lat],
            zoom: 18,
            pitch: 60,
            attributionControl: false,
            dragPan: false,
            scrollZoom: false,
            boxZoom: false,
            dragRotate: false,
            keyboard: false,
            doubleClickZoom: false,
            touchZoomRotate: false,
            touchPitch: false
          });

          // Handle manual map rotation
          let startX = 0;
          let startBearing = 0;
          map.getCanvasContainer().addEventListener("touchstart", (e) => {
            if (e.touches.length === 1) {
              startX = e.touches[0].clientX;
              startBearing = map.getBearing();
            }
          });
          map.getCanvasContainer().addEventListener("touchmove", (e) => {
            if (e.touches.length === 1) {
              const deltaX = e.touches[0].clientX - startX;
              map.setBearing(startBearing + deltaX * 0.5);
            }
          });

          map.on("render", updateModelOrientation);

          // HANDLE MAP TAPS
          map.on("click", (e) => {
            if (!TAP_TO_MOVE) return;

            const targetLat = e.lngLat.lat;
            const targetLng = e.lngLat.lng;

            if (returnTimeout) clearTimeout(returnTimeout);
            isTapOverride = true;

            currentHeading = getBearing(lastLat, lastLng, targetLat, targetLng);
            updateModelOrientation();

            const distMeters = getDistanceMeters(lastLat, lastLng, targetLat, targetLng);
            let walkDuration = (distMeters / 40) * 1000;
            if (walkDuration < 200) walkDuration = 200;

            animateMarker(lastLat, lastLng, targetLat, targetLng, walkDuration, () => {
              returnTimeout = setTimeout(() => {
                if (!realLat || !realLng) return;

                currentHeading = getBearing(lastLat, lastLng, realLat, realLng);
                updateModelOrientation();

                const retDist = getDistanceMeters(lastLat, lastLng, realLat, realLng);
                let retDuration = (retDist / 40) * 1000;
                if (retDuration < 200) retDuration = 200;

                animateMarker(lastLat, lastLng, realLat, realLng, retDuration, () => {
                  isTapOverride = false;
                });
              }, 5000);
            });
          });

          // CREATE PICKLE MARKER
          const el = document.createElement("div");
          el.innerHTML = `
            <model-viewer 
              id="player-model" 
              src="${modelUrl}" 
              autoplay 
              camera-orbit="0deg 60deg 105%" 
              shadow-intensity="1">
            </model-viewer>
          `;

          userMarker = new maplibregl.Marker({ element: el }).setLngLat([lng, lat]).addTo(map);
          lastLat = lat;
          lastLng = lng;

          map.on("load", () => {
            map.getStyle().layers.forEach((layer) => {
              if (layer.type === "symbol") map.setLayoutProperty(layer.id, "text-field", "");
              if (layer.type === "fill-extrusion") {
                map.setPaintProperty(layer.id, "fill-extrusion-height", 2);
                map.setPaintProperty(layer.id, "fill-extrusion-base", 0);
                map.setPaintProperty(layer.id, "fill-extrusion-color", "#A1A1A1");
                map.setPaintProperty(layer.id, "fill-extrusion-opacity", 0.9);
              }
              if (layer.id.includes("road") || layer.id.includes("bridge") || layer.id.includes("tunnel")) {
                if (layer.type === "line") {
                  map.setPaintProperty(layer.id, "line-color", "#D1D1D1");
                  map.setPaintProperty(layer.id, "line-width", 18);
                }
              }
              if (layer.id === "background") map.setPaintProperty(layer.id, "background-color", "#659624");
              const greenKeywords = ["park", "forest", "natural", "landuse", "grass", "wood", "landcover"];
              if (greenKeywords.some((key) => layer.id.toLowerCase().includes(key))) {
                if (layer.type === "fill") map.setPaintProperty(layer.id, "fill-color", "#224422");
              }
              if (layer.id.includes("water")) {
                if (layer.type === "fill") map.setPaintProperty(layer.id, "fill-color", "#1e90ff");
              }
            });
          });
        } else {
          if (!TAP_TO_MOVE || !isTapOverride) {
            const isMoving = Math.abs(lat - lastLat) > 0.00001;
            if (isMoving) {
              currentHeading = getBearing(lastLat, lastLng, lat, lng);
              updateModelOrientation();
            }

            if (animationFrameId) cancelAnimationFrame(animationFrameId);

            userMarker.setLngLat([lng, lat]);
            map.panTo([lng, lat], { duration: 1000 });
            lastLat = lat;
            lastLng = lng;
          }
        }
      };
    </script>
  </body>
</html>
